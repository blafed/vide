<head>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
</head>

<body data-theme="dark">
    <div class="panel">
        <canvas id="main" width="800" height="600"></canvas>
        <div id="playback">
            <button onclick="btn('prev')"><img src="svg/prev.svg" /></button>
            <button onclick="btn('play')"><img src="svg/play.svg" /></button>
            <button onclick="btn('next')"><img src="svg/next.svg" /></button>
        </div>
    </div>
    <div class="panel">
        <div id="tools">
            <button><img src="svg/cut.svg"></button>
            <button><img src="svg/split.svg"></button>
            <button><img src="svg/join.svg"></button>
            <button><img src="svg/delete.svg"></button>
            <button><img src="svg/key.svg"></button>
        </div>
    </div>

    <div class="panel">
        <div id="timeline">
            <div id="sight">
                <div class="from"></div>
                <div class="to"></div>
                <div id="carret2"></div>
            </div>
            <canvas id="preview" width="768" height="32px"></canvas>
        </div>
        <div class="container" id="tracks">
            <div class="track"><canvas width="768" height="64"></canvas></div>
        </div>
        <div id="carret"></div>
    </div>


    <div class="panel">
        <input id="file" type="file" hidden multiple oninput="on_file(this)">
        <header>
            <button onclick="btn('import')"><img src="svg/add.svg" /></button>
            <span>Assets</span>
            <div>
                <label>sort by</label>
                <select onchange="on_assets_order_by(this)">
                    <option value="0">name</option>
                    <option value="1">type</option>
                    <option value="2">date</option>
                </select>

                <label>Desc</label>
                <input type="checkbox" onchange="on_assets_order_desc(this)">
            </div>
        </header>
        <div id="assets" class="container">
            <div class="asset drag">
                <canvas class="thumb"></canvas>
                <div class="name">hi there</div>
            </div>
        </div>
    </div>
    <div class="panel">
        <div id="notif">0</div>
    </div>

    <script src="script.js"></script>
    <script>main()</script>
</body>

</html>
